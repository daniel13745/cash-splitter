<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js"></script>
    <title>Document</title>
</head>
<body>

    <div class="navbar" id="mainNav">
        <h2 class="nv_txt">Wähle deinen Trip!</h2>
        <p class="nv_txt">Einblick in deine Reisen</p>
        <br>
        <div id="tripNav"></div>
        <button type="button" class="editBtn" onclick="openTripScreen()">+ Reise hinzufügen</button>
    </div>

    <div class="navbar"></div>
        <h5 id="sc_nvbar" onclick="toggle_nav()">Menü</h5>
    </div>

    <h1 id="title">Wähle eine Reise im Menü</h1>
    <hr>

    <div class="selectBtns">
        <p class="semiHeader">Bearbeiten</p>
        <button type="button" class="editBtn" onclick="openUserScreen()">Benutzer</button>
        <button type="button" class="editBtn" onclick="openCostScreen()">Kosten</button>
    </div>
    
        <div class="addScreen" id="addUserScreen">
            <button type="button" class="XScreen" onclick="closeUserScreen()">X</button>
            <h3>Nutzer hinzufügen</h3>
            <br>
            <div>
                <span >Name</span>
                <input type="text" id="name">
            </div>
            <button type="button"  class="memmory" onclick="closeUserScreen(); createUser()">hinzufügen</button>
        </div>
    
        <div class="addScreen" id="addCostScreen">
            <button type="button" class="XScreen" onclick="closeCostScreen()">X</button>
            <h3>Neuer Buchungsbetrag</h3>
            <br>
            <div>
            <select id="meinDropdown">
            <option value="">-- Bitte wählen --</option>
            </select>

            </div>
            <button type="button"  class="memmory" onclick="closeCostScreen(); createUser()">hinzufügen</button>
        </div>
    <hr>
    

        <div class="addScreen"id="addTripScreen">
            <button type="button" class="XScreen" onclick="closeTripScreen()">X</button>
            <h3>Reise hinzufügen</h3>
            <br>
            <div>
                <span>Name</span>
                <input type="text" id="tripName">
            </div>
            <button type="button" class="memmory" onclick="closeTripScreen(); createTrip()">hinzufügen</button>
        </div>


    <div class="table">
        <p class="semiHeader">Ansicht</p>
        <ul id="persons"></ul>
    </div>
</body>
</html>
